<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ESP32 Display Preview</title>
<style>
  body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
  .frame { width: 480px; height: 320px; border: 3px solid #555; border-radius: 8px; overflow: hidden; position: relative; background: #000; }
  /* Status bar */
  .status-bar { position: absolute; top: 0; left: 0; right: 0; height: 18px; background: rgba(10,10,18,0.95); z-index: 10; display: flex; align-items: center; padding: 0 6px; font-size: 10px; color: #787d9b; }
  .status-bar .wifi-bars { display: flex; align-items: flex-end; gap: 2px; margin-right: 6px; }
  .status-bar .wifi-bars .bar { width: 3px; background: #50a0ff; }
  .status-bar .ip { flex: 1; }
  .status-bar .time { margin-right: 6px; }
  .status-bar .dot { width: 6px; height: 6px; border-radius: 50%; background: #32cd64; }
  /* Content area */
  .content { position: absolute; top: 18px; left: 0; right: 0; bottom: 36px; overflow: hidden; }
  .content .bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
  /* Nav bar */
  .nav-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 36px; background: #0c0c14; border-top: 1px solid #2d3246; display: flex; z-index: 10; }
  .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #787d9b; font-size: 9px; gap: 3px; }
  .nav-tab.active { color: #50a0ff; }
  .nav-tab .indicator { width: 40px; height: 2px; background: transparent; }
  .nav-tab.active .indicator { background: #50a0ff; }
  .nav-tab .icon { width: 6px; height: 6px; border-radius: 50%; border: 1px solid #787d9b; }
  .nav-tab.active .icon { background: #50a0ff; border-color: #50a0ff; }

  .screen { display: none; position: absolute; inset: 0; }
  .screen.active { display: block; }

  /* Outlined text effect */
  .outlined {
    text-shadow:
      -1px -1px 0 #000, 1px -1px 0 #000,
      -1px 1px 0 #000, 1px 1px 0 #000,
      0 -1px 0 #000, 0 1px 0 #000,
      -1px 0 0 #000, 1px 0 0 #000;
  }
  .outlined-thick {
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000,
      -2px 2px 0 #000, 2px 2px 0 #000,
      0 -2px 0 #000, 0 2px 0 #000,
      -2px 0 0 #000, 2px 0 0 #000,
      -1px -2px 0 #000, 1px -2px 0 #000,
      -1px 2px 0 #000, 1px 2px 0 #000,
      -2px -1px 0 #000, 2px -1px 0 #000,
      -2px 1px 0 #000, 2px 1px 0 #000;
  }

  /* Clock screen */
  .clock-time-box {
    position: absolute; top: 12px; left: 90px; width: 300px; height: 80px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .clock-time { font-size: 44px; font-weight: bold; color: #fff; line-height: 1; }
  .clock-time .sec { font-size: 18px; color: #50a0ff; vertical-align: super; margin-left: 4px; }
  .clock-date { font-size: 15px; color: #787d9b; margin-top: 4px; }

  .weather-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 20px 8px; }
  .weather-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .weather-left .temp { font-size: 40px; font-weight: bold; color: #fff; line-height: 1; }
  .weather-left .desc { font-size: 12px; color: #787d9b; margin-top: 2px; }
  .weather-right { text-align: right; font-size: 11px; line-height: 1.6; color: #e6e6f5; }
  .weather-right .dim { color: #787d9b; }
  .weather-city { font-size: 11px; color: #787d9b; position: absolute; bottom: 8px; left: 170px; }

  /* Stocks screen */
  .stocks-title { position: absolute; top: 10px; left: 20px; font-size: 17px; font-weight: bold; color: #e6e6f5; }
  .stocks-grid { position: absolute; top: 38px; left: 20px; right: 20px; }
  .stock-row { display: flex; align-items: center; height: 38px; gap: 8px; }
  .stock-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stock-dot.up { background: #32cd64; }
  .stock-dot.down { background: #ff4b4b; }
  .stock-symbol { font-weight: bold; font-size: 13px; color: #e6e6f5; width: 70px; }
  .stock-price { font-size: 12px; color: #e6e6f5; width: 70px; }
  .stock-change { font-size: 12px; }
  .stock-change.up { color: #32cd64; }
  .stock-change.down { color: #ff4b4b; }
  .stock-arrow { font-size: 10px; }

  /* News screen */
  .news-title { position: absolute; top: 10px; left: 20px; font-size: 17px; font-weight: bold; color: #e6e6f5; }
  .news-list { position: absolute; top: 38px; left: 20px; right: 20px; }
  .news-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .news-num { font-weight: bold; font-size: 13px; color: #8264ff; min-width: 16px; padding-top: 2px; }
  .news-content {}
  .news-headline { font-size: 11px; color: #e6e6f5; line-height: 1.3; }
  .news-source { font-size: 9px; color: #8264ff; margin-top: 1px; }

  .info { color: #888; font-size: 13px; text-align: center; margin-top: 16px; }
</style>
</head>
<body>

<div>
  <div class="frame" id="display">
    <!-- Status bar -->
    <div class="status-bar">
      <div class="wifi-bars">
        <div class="bar" style="height:3px"></div>
        <div class="bar" style="height:5px"></div>
        <div class="bar" style="height:7px"></div>
        <div class="bar" style="height:9px"></div>
      </div>
      <span class="ip" id="ip">192.168.2.xxx</span>
      <span class="time" id="sbar-time">--:--</span>
      <div class="dot" id="status-dot"></div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Clock/Weather screen -->
      <div class="screen active" id="screen-clock">
        <div class="bg" id="bg-weather"></div>
        <div class="clock-time-box outlined-thick">
          <div class="clock-time"><span id="clock-h">--</span>:<span id="clock-m">--</span><span class="sec" id="clock-s">--</span></div>
          <div class="clock-date outlined" id="clock-date">Loading...</div>
        </div>
        <div class="weather-info outlined">
          <div class="weather-bottom">
            <div class="weather-left">
              <div class="temp" id="w-temp-big">--°C</div>
              <div class="desc" id="w-desc">--</div>
            </div>
            <div class="weather-right">
              <div>Feels <span id="w-feels">--</span>°C</div>
              <div>H <span id="w-high">--</span>° / L <span id="w-low">--</span>°</div>
              <div class="dim">Humid <span id="w-humid">--</span>%  Wind <span id="w-wind">--</span> km/h</div>
            </div>
          </div>
          <div class="weather-city" id="w-city">@ --</div>
        </div>
      </div>

      <!-- Stocks screen -->
      <div class="screen" id="screen-stocks">
        <div class="bg" id="bg-stocks"></div>
        <div class="stocks-title outlined">Market Watch</div>
        <div class="stocks-grid outlined" id="stocks-grid"></div>
      </div>

      <!-- News screen -->
      <div class="screen" id="screen-news">
        <div class="bg" id="bg-news"></div>
        <div class="news-title outlined">Headlines</div>
        <div class="news-list outlined" id="news-list"></div>
      </div>
    </div>

    <!-- Nav bar -->
    <div class="nav-bar">
      <div class="nav-tab active" data-screen="clock">
        <div class="indicator"></div>
        <div class="icon"></div>
        <span>Weather</span>
      </div>
      <div class="nav-tab" data-screen="stocks">
        <div class="indicator"></div>
        <div class="icon"></div>
        <span>Stocks</span>
      </div>
      <div class="nav-tab" data-screen="news">
        <div class="indicator"></div>
        <div class="icon"></div>
        <span>News</span>
      </div>
    </div>
  </div>
  <div class="info">ESP32 Display Preview (480x320) — click tabs to switch</div>
</div>

<script>
const API = location.origin;

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock-h').textContent = String(now.getHours()).padStart(2, '0');
  document.getElementById('clock-m').textContent = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock-s').textContent = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('sbar-time').textContent = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clock-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
}
setInterval(updateClock, 1000);
updateClock();

// Fetch data
async function loadData() {
  try {
    const resp = await fetch(API + '/api/dashboard');
    const data = await resp.json();

    // Weather
    const w = data.weather;
    document.getElementById('w-temp-big').textContent = w.temp + '°C';
    document.getElementById('w-desc').textContent = w.description;
    document.getElementById('w-feels').textContent = w.feels_like;
    document.getElementById('w-high').textContent = w.high;
    document.getElementById('w-low').textContent = w.low;
    document.getElementById('w-humid').textContent = w.humidity;
    document.getElementById('w-wind').textContent = w.wind;
    document.getElementById('w-city').textContent = '@ ' + w.city;
    document.getElementById('bg-weather').style.backgroundImage = 'url(' + API + '/api/bg/weather)';

    // Stocks - no cards, just text rows in 2 columns
    const grid = document.getElementById('stocks-grid');
    grid.innerHTML = '';
    const left = data.stocks.slice(0, 3);
    const right = data.stocks.slice(3, 6);
    const table = document.createElement('div');
    table.style.cssText = 'display:grid; grid-template-columns: 1fr 1fr; gap: 0 20px;';
    for (const col of [left, right]) {
      const colDiv = document.createElement('div');
      for (const s of col) {
        const up = s.change >= 0;
        colDiv.innerHTML += `
          <div class="stock-row">
            <div class="stock-dot ${up ? 'up' : 'down'}"></div>
            <span class="stock-symbol">${s.symbol}</span>
            <span class="stock-price">$${s.price.toFixed(2)}</span>
            <span class="stock-change ${up ? 'up' : 'down'}">${up ? '+' : ''}${s.change.toFixed(2)} (${s.pct.toFixed(1)}%)</span>
            <span class="stock-arrow stock-change ${up ? 'up' : 'down'}">${up ? '\u25B2' : '\u25BC'}</span>
          </div>`;
      }
      table.appendChild(colDiv);
    }
    grid.appendChild(table);

    // News - no cards, just numbered text
    const list = document.getElementById('news-list');
    list.innerHTML = '';
    data.news.forEach((n, i) => {
      let title = n.title.length > 44 ? n.title.slice(0, 41) + '...' : n.title;
      list.innerHTML += `
        <div class="news-row">
          <span class="news-num">${i + 1}</span>
          <div class="news-content">
            <div class="news-headline">${title}</div>
            <div class="news-source">${n.source}</div>
          </div>
        </div>`;
    });

    document.getElementById('status-dot').style.background = '#32cd64';
  } catch (e) {
    document.getElementById('status-dot').style.background = '#ff4b4b';
  }
}

// Backgrounds
document.getElementById('bg-stocks').style.backgroundImage = 'url(' + API + '/api/bg/stocks)';
document.getElementById('bg-news').style.backgroundImage = 'url(' + API + '/api/bg/news)';
loadData();

// Tab switching
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('screen-' + tab.dataset.screen).classList.add('active');
  });
});
</script>
</body>
</html>
