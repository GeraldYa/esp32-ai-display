<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ESP32 Display Preview</title>
<style>
  body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
  .frame { width: 480px; height: 320px; border: 3px solid #555; border-radius: 8px; overflow: hidden; position: relative; background: #000; }
  /* Status bar */
  .status-bar { position: absolute; top: 0; left: 0; right: 0; height: 18px; background: rgba(10,10,18,0.95); z-index: 10; display: flex; align-items: center; padding: 0 6px; font-size: 10px; color: #787d9b; }
  .status-bar .wifi-bars { display: flex; align-items: flex-end; gap: 2px; margin-right: 6px; }
  .status-bar .wifi-bars .bar { width: 3px; background: #50a0ff; }
  .status-bar .ip { flex: 1; }
  .status-bar .time { margin-right: 6px; }
  .status-bar .dot { width: 6px; height: 6px; border-radius: 50%; background: #32cd64; }
  /* Content area */
  .content { position: absolute; top: 18px; left: 0; right: 0; bottom: 36px; overflow: hidden; }
  .content .bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
  /* Nav bar */
  .nav-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 36px; background: #0c0c14; border-top: 1px solid #2d3246; display: flex; z-index: 10; }
  .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #787d9b; font-size: 9px; gap: 3px; }
  .nav-tab.active { color: #50a0ff; }
  .nav-tab .indicator { width: 40px; height: 2px; background: transparent; }
  .nav-tab.active .indicator { background: #50a0ff; }
  .nav-tab .icon { width: 6px; height: 6px; border-radius: 50%; border: 1px solid #787d9b; }
  .nav-tab.active .icon { background: #50a0ff; border-color: #50a0ff; }

  .screen { display: none; position: absolute; inset: 0; }
  .screen.active { display: block; }

  /* Outlined text effect */
  .outlined {
    text-shadow:
      -1px -1px 0 #000, 1px -1px 0 #000,
      -1px 1px 0 #000, 1px 1px 0 #000,
      0 -1px 0 #000, 0 1px 0 #000,
      -1px 0 0 #000, 1px 0 0 #000;
  }
  .outlined-thick {
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000,
      -2px 2px 0 #000, 2px 2px 0 #000,
      0 -2px 0 #000, 0 2px 0 #000,
      -2px 0 0 #000, 2px 0 0 #000,
      -1px -2px 0 #000, 1px -2px 0 #000,
      -1px 2px 0 #000, 1px 2px 0 #000,
      -2px -1px 0 #000, 2px -1px 0 #000,
      -2px 1px 0 #000, 2px 1px 0 #000;
  }

  /* Clock screen */
  .clock-time-box {
    position: absolute; top: 12px; left: 90px; width: 300px; height: 80px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .clock-time { font-size: 44px; font-weight: bold; color: #fff; line-height: 1; }
  .clock-date { font-size: 15px; color: #787d9b; margin-top: 4px; }

  .weather-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 20px 8px; }
  .weather-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .weather-left .temp { font-size: 40px; font-weight: bold; color: #e6e6f5; line-height: 1; }
  .weather-left .desc { font-size: 12px; color: #787d9b; margin-top: 2px; }
  .weather-right { text-align: right; font-size: 11px; line-height: 1.6; color: #e6e6f5; }
  .weather-right .dim { color: #787d9b; }
  .weather-city { font-size: 11px; color: #787d9b; position: absolute; bottom: 8px; left: 170px; }

  /* Stocks screen */
  .stocks-title { position: absolute; top: 10px; left: 20px; font-size: 17px; font-weight: bold; color: #e6e6f5; }
  .stocks-grid { position: absolute; top: 47px; left: 20px; right: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
  .stock-item { height: 42px; display: flex; align-items: flex-start; flex-direction: column; justify-content: center; }
  .stock-top { display: flex; align-items: center; gap: 6px; }
  .stock-bottom { display: flex; align-items: center; gap: 6px; margin-left: 14px; }
  .stock-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stock-symbol { font-weight: bold; font-size: 13px; color: #e6e6f5; }
  .stock-change { font-size: 12px; }
  .stock-price { font-size: 12px; color: #e6e6f5; }
  .up { color: #32cd64; }
  .down { color: #ff4b4b; }

  /* News screen */
  .news-title { position: absolute; top: 10px; left: 20px; font-size: 17px; font-weight: bold; color: #e6e6f5; }
  .news-lang-btn { position: absolute; top: 10px; right: 20px; font-size: 13px; font-weight: bold; color: #50a0ff; cursor: pointer; }
  .news-list { position: absolute; top: 44px; left: 20px; right: 20px; }
  .news-row { display: flex; align-items: flex-start; gap: 8px; height: 42px; cursor: pointer; }
  .news-row:hover { opacity: 0.8; }
  .news-num { font-weight: bold; font-size: 13px; color: #8264ff; min-width: 16px; padding-top: 2px; }
  .news-headline { font-size: 11px; color: #e6e6f5; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
  .news-source { font-size: 9px; color: #8264ff; margin-top: 2px; }

  /* News detail screen */
  .detail-back { position: absolute; top: 4px; left: 15px; font-size: 13px; font-weight: bold; color: #50a0ff; cursor: pointer; }
  .detail-title { position: absolute; top: 30px; left: 20px; right: 20px; font-size: 13px; font-weight: bold; color: #e6e6f5; line-height: 1.4; }
  .detail-source { position: absolute; top: 72px; left: 20px; font-size: 12px; color: #8264ff; }
  .detail-summary { position: absolute; top: 95px; left: 20px; right: 20px; font-size: 12px; color: #787d9b; line-height: 1.6; }

  .info { color: #888; font-size: 13px; text-align: center; margin-top: 16px; }
</style>
</head>
<body>

<div>
  <div class="frame" id="display">
    <!-- Status bar -->
    <div class="status-bar">
      <div class="wifi-bars">
        <div class="bar" style="height:3px"></div>
        <div class="bar" style="height:5px"></div>
        <div class="bar" style="height:7px"></div>
        <div class="bar" style="height:9px"></div>
      </div>
      <span class="ip" id="ip">192.168.2.132</span>
      <span class="time" id="sbar-time">--:--</span>
      <span class="lang-indicator" id="lang-indicator" style="color:#50a0ff;cursor:pointer;margin-right:6px;font-size:10px">EN</span>
      <div class="dot" id="status-dot"></div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Clock/Weather screen -->
      <div class="screen active" id="screen-clock">
        <div class="bg" id="bg-weather"></div>
        <div class="clock-time-box outlined-thick">
          <div class="clock-time"><span id="clock-h">--</span>:<span id="clock-m">--</span></div>
          <div class="clock-date outlined" id="clock-date">Loading...</div>
        </div>
        <div class="weather-info outlined">
          <div class="weather-bottom">
            <div class="weather-left">
              <div class="temp" id="w-temp-big">--°C</div>
              <div class="desc" id="w-desc">--</div>
            </div>
            <div class="weather-right">
              <div>Feels <span id="w-feels">--</span>°C</div>
              <div>H <span id="w-high">--</span>° / L <span id="w-low">--</span>°</div>
              <div class="dim">Humid <span id="w-humid">--</span>%  Wind <span id="w-wind">--</span> km/h</div>
            </div>
          </div>
          <div class="weather-city" id="w-city">@ --</div>
        </div>
      </div>

      <!-- Stocks screen -->
      <div class="screen" id="screen-stocks">
        <div class="bg" id="bg-stocks"></div>
        <div class="stocks-title outlined">Market Watch</div>
        <div class="stocks-grid outlined" id="stocks-grid"></div>
      </div>

      <!-- News screen -->
      <div class="screen" id="screen-news">
        <div class="bg" id="bg-news"></div>
        <div class="news-title outlined">Headlines</div>
        <!-- language toggle moved to status bar -->
        <div class="news-list outlined" id="news-list"></div>
      </div>

      <!-- News Detail screen -->
      <div class="screen" id="screen-detail">
        <div class="bg" id="bg-detail"></div>
        <div class="detail-back outlined" id="detail-back">&lt; Back</div>
        <div class="detail-title outlined" id="detail-title"></div>
        <div class="detail-source outlined" id="detail-source"></div>
        <div class="detail-summary outlined" id="detail-summary">Loading summary...</div>
      </div>
    </div>

    <!-- Nav bar -->
    <div class="nav-bar" id="nav-bar">
      <div class="nav-tab active" data-screen="clock">
        <div class="indicator"></div>
        <div class="icon"></div>
        <span>Weather</span>
      </div>
      <div class="nav-tab" data-screen="stocks">
        <div class="indicator"></div>
        <div class="icon"></div>
        <span>Stocks</span>
      </div>
      <div class="nav-tab" data-screen="news">
        <div class="indicator"></div>
        <div class="icon"></div>
        <span>News</span>
      </div>
    </div>
  </div>
  <div class="info">ESP32 Display Preview (480×320) — click tabs to switch, click news to see detail</div>
</div>

<script>
const API = location.origin;
let langZh = false;
let newsData = [];
let currentScreen = 'clock';

// Clock - update every minute (matches ESP32 behavior)
function updateClock() {
  const now = new Date();
  document.getElementById('clock-h').textContent = String(now.getHours()).padStart(2, '0');
  document.getElementById('clock-m').textContent = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('sbar-time').textContent =
    String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clock-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
}
setInterval(updateClock, 1000);
updateClock();

// Switch screens
function switchScreen(name) {
  currentScreen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.screen === name);
  });
  // Show/hide nav bar in detail view
  document.getElementById('nav-bar').style.display = (name === 'detail') ? 'none' : '';
}

// Update all UI text for current language
let dashData = null;
function updateLanguage() {
  document.getElementById('lang-indicator').textContent = langZh ? 'ZH' : 'EN';
  // Nav tabs
  const tabLabels = langZh ? ['天气', '股票', '新闻'] : ['Weather', 'Stocks', 'News'];
  document.querySelectorAll('.nav-tab span').forEach((s, i) => { s.textContent = tabLabels[i]; });
  // Titles
  document.querySelector('#screen-stocks .stocks-title').textContent = langZh ? '行情' : 'Market Watch';
  document.querySelector('#screen-news .news-title').textContent = langZh ? '头条' : 'Headlines';
  document.getElementById('detail-back').innerHTML = langZh ? '&lt; 返回' : '&lt; Back';
  // Weather labels
  if (dashData) renderWeather(dashData.weather);
  renderNewsList();
  // Re-render detail if open
  if (currentScreen === 'detail') {
    const idx = parseInt(document.getElementById('detail-title').dataset.idx || '0');
    const n = newsData[idx];
    if (n) {
      document.getElementById('detail-title').textContent = langZh && n.title_zh ? n.title_zh : n.title;
    }
  }
}

function renderWeather(w) {
  document.getElementById('w-temp-big').textContent = w.temp + '°C';
  document.getElementById('w-desc').textContent = w.description;
  document.getElementById('w-city').textContent = '@ ' + w.city;
  if (langZh) {
    document.querySelector('.weather-right').innerHTML =
      `<div>体感 ${w.feels_like}°C</div><div>${w.high}° / ${w.low}°</div><div class="dim">湿度${w.humidity}%  风${w.wind}km/h</div>`;
  } else {
    document.querySelector('.weather-right').innerHTML =
      `<div>Feels ${w.feels_like}°C</div><div>H ${w.high}° / L ${w.low}°</div><div class="dim">Humid ${w.humidity}%  Wind ${w.wind} km/h</div>`;
  }
}

// Fetch and render dashboard data
async function loadData() {
  try {
    const resp = await fetch(API + '/api/dashboard');
    const data = await resp.json();
    dashData = data;

    // Weather
    renderWeather(data.weather);
    document.getElementById('bg-weather').style.backgroundImage = 'url(' + API + '/api/bg/weather)';


    // Stocks - 2 column grid matching ESP32 layout
    const grid = document.getElementById('stocks-grid');
    grid.innerHTML = '';
    // ESP32 does: col = i%2, row = i/2, x = 20 + col*235
    for (let i = 0; i < data.stocks.length && i < 6; i++) {
      const s = data.stocks[i];
      const up = s.change >= 0;
      const cls = up ? 'up' : 'down';
      grid.innerHTML += `
        <div class="stock-item">
          <div class="stock-top">
            <div class="stock-dot ${cls}" style="background:${up ? '#32cd64' : '#ff4b4b'}"></div>
            <span class="stock-symbol">${s.symbol}</span>
            <span class="stock-change ${cls}">${up ? '+' : ''}${s.change.toFixed(2)} (${s.pct.toFixed(1)}%)</span>
          </div>
          <div class="stock-bottom">
            <span class="stock-price">$${s.price.toFixed(2)}</span>
            <span class="stock-change ${cls}">${up ? '▲' : '▼'}</span>
          </div>
        </div>`;
    }

    // News
    newsData = data.news;
    renderNewsList();

    document.getElementById('status-dot').style.background = '#32cd64';
  } catch (e) {
    document.getElementById('status-dot').style.background = '#ff4b4b';
  }
}

function renderNewsList() {
  const list = document.getElementById('news-list');
  list.innerHTML = '';
  newsData.forEach((n, i) => {
    const title = langZh && n.title_zh ? n.title_zh : (n.title.length > 44 ? n.title.slice(0, 41) + '...' : n.title);
    list.innerHTML += `
      <div class="news-row" data-idx="${i}">
        <span class="news-num">${i + 1}</span>
        <div>
          <div class="news-headline">${title}</div>
          <div class="news-source">${n.source}</div>
        </div>
      </div>`;
  });
  // Click to open detail
  list.querySelectorAll('.news-row').forEach(row => {
    row.addEventListener('click', () => openDetail(parseInt(row.dataset.idx)));
  });
}

// News detail
async function openDetail(idx) {
  const n = newsData[idx];
  if (!n) return;

  document.getElementById('bg-detail').style.backgroundImage = 'url(' + API + '/api/bg/news)';
  document.getElementById('detail-title').textContent = langZh && n.title_zh ? n.title_zh : n.title;
  document.getElementById('detail-title').dataset.idx = idx;
  document.getElementById('detail-source').textContent = '- ' + n.source;
  document.getElementById('detail-summary').textContent = 'Loading summary...';
  switchScreen('detail');

  try {
    const resp = await fetch(API + '/api/news/' + idx);
    const data = await resp.json();
    const summary = langZh && data.summary_zh ? data.summary_zh : data.summary;
    document.getElementById('detail-summary').textContent = summary || 'No summary available';
  } catch (e) {
    document.getElementById('detail-summary').textContent = 'Failed to load summary';
  }
}

// Back from detail
document.getElementById('detail-back').addEventListener('click', () => switchScreen('news'));

// Global language toggle (status bar)
document.getElementById('lang-indicator').addEventListener('click', () => {
  langZh = !langZh;
  updateLanguage();
});

// Backgrounds
document.getElementById('bg-stocks').style.backgroundImage = 'url(' + API + '/api/bg/stocks)';
document.getElementById('bg-news').style.backgroundImage = 'url(' + API + '/api/bg/news)';
document.getElementById('bg-detail').style.backgroundImage = 'url(' + API + '/api/bg/news)';
loadData();
// Refresh data every 10 minutes (matches ESP32)
setInterval(loadData, 600000);

// Tab switching
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchScreen(tab.dataset.screen));
});
</script>
</body>
</html>
